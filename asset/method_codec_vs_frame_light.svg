<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="580" viewBox="0 0 1100 580" role="img" aria-labelledby="title desc">
<title id="title">Codec vs Frame Sampling</title>
<desc id="desc">Table-style small multiples comparing codec-aligned sampling against uniform frame sampling across seven video benchmarks.</desc>
<defs>
<style><![CDATA[
@keyframes cvf-fade{from{opacity:0}to{opacity:1}}
@keyframes cvf-draw{from{stroke-dashoffset:900}to{stroke-dashoffset:0}}
g[id^="cvf-panel-"]{animation:cvf-fade .4s ease-out both}
.codec-line{stroke:#2563eb;stroke-dasharray:900;animation:cvf-draw 1.2s ease-out .35s both}
.frame-line{stroke:#94a3b8}
.caption{font:600 15px "DejaVu Serif", "Nimbus Roman", "Times New Roman", "Times", serif;fill:#0f172a}
.panel-title{font:600 14px "DejaVu Serif", "Nimbus Roman", "Times New Roman", "Times", serif;fill:#0f172a}
.subhead{font:12px "DejaVu Serif", "Nimbus Roman", "Times New Roman", "Times", serif;fill:#64748b}
.tick{font:12px "DejaVu Serif", "Nimbus Roman", "Times New Roman", "Times", serif;fill:#64748b}
.score-codec{font:bold 13px "DejaVu Serif", "Nimbus Roman", "Times New Roman", "Times", serif;fill:#2563eb}
.score-frame{font:bold 13px "DejaVu Serif", "Nimbus Roman", "Times New Roman", "Times", serif;fill:#94a3b8}
.axis{stroke:#0f172a;stroke-width:0.6}
.grid{stroke:#e2e8f0;stroke-width:0.8}
.advantage{fill:#d4e8d0}
.summary-text{fill:#0f172a}
.muted-text{fill:#64748b}
]]></style>
